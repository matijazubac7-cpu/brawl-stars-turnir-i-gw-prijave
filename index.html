<!DOCTYPE html>
<html>
<head>
  <title>Brawl Stars Turnir</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e90ff, #00bfff);
      color: white;
      text-align: center;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: rgba(0,0,0,0.2);
    }

    .user-icon {
      cursor: pointer;
      font-size: 28px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      background: white;
      color: #1e90ff;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      padding: 8px;
      margin: 3px;
      border-radius: 5px;
      border: none;
      width: 90%;
    }

    .box { display: none; margin-top: 20px; }
    .admin { display: none; margin-top: 10px; }

    ul { list-style: none; padding: 0; }
    li { background: rgba(255,255,255,0.2); margin: 3px; padding: 5px; border-radius: 5px; }

    #error { color: red; font-weight: bold; }
    #success { color: lightgreen; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <h2>Brawl Stars</h2>
  <div class="user-icon" onclick="show('adminLogin')">👤</div>
</header>

<h1>Pozdrav 👋</h1>
<p>Ovde se možete prijaviti u GW ili turnir</p>

<button onclick="show('gw')">🎁 Giveaway</button>
<button onclick="show('turnir')">🏆 Turnir</button>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="box">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Lozinka">
  <button onclick="login()">Login</button>
  <p id="error"></p>
  <p id="success"></p>
  <label><input type="checkbox" id="showPass" onchange="togglePass()"> Prikaži lozinku</label>
</div>

<!-- GIVEAWAY -->
<div id="gw" class="box">
  <h2 id="gwNaziv">GW</h2>
  <p id="gwVrijeme"></p>

  <button onclick="prijavaGW()">Prijavi se u GW</button>
  <p>Broj prijavljenih: <span id="brojGW">0</span></p>
  <ul id="listaGW"></ul>

  <div class="admin" id="adminGW">
    <input id="nazivInput" placeholder="Naziv GW">
    <input id="vrijemeInput" placeholder="Vrijeme">
    <button onclick="postaviGW()">Postavi GW</button>
    <button onclick="izvuci()">🎲 Izvuci pobjednika</button>
    <button onclick="resetGW()">Reset GW</button>
    <button onclick="logout()">Logout</button>
  </div>

  <h3 id="pobjednik"></h3>
</div>

<!-- TURNIR -->
<div id="turnir" class="box">
  <input id="p1" placeholder="Igrač 1">
  <input id="p2" placeholder="Igrač 2">
  <input id="p3" placeholder="Igrač 3">
  <input id="tim" placeholder="Ime tima">
  <input id="bsid" placeholder="BS ID">

  <button onclick="prijavaTurnir()">Prijavi se</button>
  <p>Broj timova: <span id="brojTurnir">0</span></p>
  <ul id="listaTurnir"></ul>

  <div class="admin" id="adminTurnir">
    <button onclick="resetTurnir()">Reset Turnir</button>
  </div>
</div>

<script>
  // ADMIN LOZINKE
  const adminSifre = ["NEVESINJE2026.28.3", "ADMIN123"];
  let admin = false;

  let gwList = [];
  let turnirList = [];

  function show(id) {
    document.querySelectorAll(".box").forEach(b => b.style.display = "none");
    document.getElementById(id).style.display = "block";
  }

  function togglePass() {
    let p = document.getElementById("adminPass");
    p.type = p.type === "password" ? "text" : "password";
  }

  function login() {
    let pass = document.getElementById("adminPass").value;
    let error = document.getElementById("error");
    let success = document.getElementById("success");

    if(adminSifre.includes(pass)) {
      admin = true;
      localStorage.setItem("admin", "true");
      document.querySelectorAll(".admin").forEach(a => a.style.display = "block");
      error.textContent = "";
      success.textContent = "✅ Uspješno ste se prijavili!";
    } else {
      error.textContent = "❌ Pogrešna lozinka!";
      success.textContent = "";
    }
  }

  if(localStorage.getItem("admin") === "true") {
    admin = true;
    document.querySelectorAll(".admin").forEach(a => a.style.display = "block");
  }

  function logout() {
    localStorage.removeItem("admin");
    location.reload();
  }

  function prijavaGW() {
    let ime = prompt("Unesi ime i prezime:");
    if(!ime) return;
    gwList.push(ime);
    updateGW();
    alert("✅ Uspješno ste se prijavili!");
  }

  function updateGW() {
    let ul = document.getElementById("listaGW");
    ul.innerHTML = "";
    gwList.forEach(i => {
      let li = document.createElement("li");
      li.textContent = i;
      ul.appendChild(li);
    });
    document.getElementById("brojGW").textContent = gwList.length;
  }

  function postaviGW() {
    if(!admin) return;
    let n = document.getElementById("nazivInput").value;
    let v = document.getElementById("vrijemeInput").value;
    document.getElementById("gwNaziv").textContent = n;
    document.getElementById("gwVrijeme").textContent = "Vrijeme: " + v;
  }

  function izvuci() {
    if(!admin) return;
    if(gwList.length===0) { alert("Nema prijavljenih!"); return; }
    let win = gwList[Math.floor(Math.random()*gwList.length)];
    document.getElementById("pobjednik").textContent = "🎉 Pobjednik: " + win;
  }

  function resetGW() {
    if(!admin) return;
    gwList = [];
    updateGW();
    document.getElementById("pobjednik").textContent = "";
  }

  function prijavaTurnir() {
    let p1 = document.getElementById("p1").value;
    let p2 = document.getElementById("p2").value;
    let p3 = document.getElementById("p3").value;
    let tim = document.getElementById("tim").value;
    let bsid = document.getElementById("bsid").value;

    if(!p1 || !p2 || !p3 || !tim || !bsid) return alert("Popuni sve podatke!");
    turnirList.push({p1,p2,p3,tim,bsid});
    updateTurnir();
    alert("✅ Uspješno ste se prijavili u turnir!");
  }

  function updateTurnir() {
    let ul = document.getElementById("listaTurnir");
    ul.innerHTML = "";
    turnirList.forEach(t => {
      let li = document.createElement("li");
      li.textContent = `${t.tim} (${t.p1}, ${t.p2}, ${t.p3})`;
      ul.appendChild(li);
    });
    document.getElementById("brojTurnir").textContent = turnirList.length;
  }

  function resetTurnir() {
    if(!admin) return;
    turnirList = [];
    updateTurnir();
  }
</script>

</body>
</html>
