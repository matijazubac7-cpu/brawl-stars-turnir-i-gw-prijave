<!DOCTYPE html>
<html>
<head>
  <title>Brawl Turnir</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body style="background:#1e90ff;color:white;text-align:center;font-family:Arial;">

<h1>Brawl Turnir</h1>

<button onclick="prijavaGW()">Prijavi se u GW</button>
<p>Broj prijavljenih: <span id="brojGW">0</span></p>

<script>
const firebaseConfig = {
  apiKey: "OVDJE",
  authDomain: "OVDJE",
  projectId: "OVDJE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function prijavaGW(){
  let ime = prompt("Unesi ime i prezime:");
  if(!ime) return;
  db.collection("gw").add({ime});
  alert("Uspješno ste se prijavili!");
}

db.collection("gw").onSnapshot(snapshot=>{
  document.getElementById("brojGW").textContent = snapshot.size;
});
</script>

</body>
</html>
